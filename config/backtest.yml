# Backtest configuration
# Run with: python3 scripts/backtest.py --config config/backtest.yml
#
# The backtest is ANALYSIS-DRIVEN: it reads the LLM analysis tab and treats every
# non-MARKET ticker row that has a play as a decision to open a position. There is
# deliberately no signal_filter here — the analysis IS the filter. To change what
# gets traded, change the analysis, not this file.
#
# ── Priority periods to backtest ──────────────────────────────────────────────
# Run the analysis pipeline over these date ranges first (--start/--end), then
# run the backtest. Ordered by how much signal diversity they add:
#
#   Priority 1  2024-07-15 → 2024-08-15   Sideways/chop
#   Priority 2  2024-11-01 → 2024-12-31   Strong bull
#   Priority 3  2025-03-13 → 2025-04-08   Panic/correction
#   Priority 4  2024-09-01 → 2024-10-01   Macro regime
#   Priority 5  2024-10-15 → 2024-11-15   Earnings-heavy

# ── Analysis source ────────────────────────────────────────────────────────────
analysis:
  # Which analysis tab to backtest. Populate it first via /options analyze in
  # range mode (which appends one analysis per date) so there is history to test.
  #   AnalysisClaude — Claude Code analyses
  #   AnalysisGPT    — GPT Codex analyses
  tab: AnalysisClaude

# ── Entry matching ─────────────────────────────────────────────────────────────
# Each play is matched to the real flow contract it refers to (same symbol +
# direction, largest premium). The actual `Trade` price of that contract is the
# entry price — no Black-Scholes for entry.
entry:
  # Require the matched flow trade to be on a given side: Ask | Bid | Mid | any.
  # "Ask" = buyer-initiated (directional conviction). "any" matches the headline
  # trade regardless of side.
  match_side: any

# ── Trade simulation ───────────────────────────────────────────────────────────
simulation:
  # Portfolio value used for fixed-fractional position sizing.
  # Combined with risk_per_trade_pct, contracts are sized so that hitting
  # the stop_loss costs exactly risk_per_trade_pct × portfolio_value.
  # Set portfolio_value to null (or omit) to fall back to fixed contracts below.
  portfolio_value: 50000
  risk_per_trade_pct: 0.02

  # Fallback: fixed contracts when portfolio_value is not set.
  contracts: 1

  # Fixed profit target as a fraction of entry premium. Used alongside trailing_stop —
  # profit_target fires reliably for normal winners; trailing_stop catches parabolic moves
  # that gap past the trigger before profit_target can fire.
  profit_target: 0.75

  # Hard stop loss as a fraction of entry premium. Combined with the dollar_stop
  # from portfolio sizing, this is the floor before any trailing logic.
  stop_loss: 0.75 # -75%

  # Time-based exit: close when this fraction of the original DTE has elapsed.
  # e.g. 0.75 = close when 25% DTE remains. null to disable.
  # Set to 0.5 previously — too early, many big moves happen in the back half.
  time_exit_dte_fraction: 0.75

  # Trailing stop: once profit reaches trailing_stop_trigger, trail from peak.
  # Trail must be wide relative to daily option noise (options swing 20-40%/day).
  # Trigger=1.0 means "only protect after doubling" — avoids cutting developing moves.
  # pct=0.50 means peak+150% trails to floor+100%, peak+200% trails to +150%.
  trailing_stop_trigger: 1.00  # activate only after +100% gain
  trailing_stop_pct: 0.50      # trail 50 pts from peak

  # Extended loss exit: disabled — these plays need 3-6 weeks to develop and
  # routinely look bad in the middle before the big move. 10-day cutoff was
  # killing trades that went on to 100-160% MFE.
  loss_days_exit: null

  # Record a P&L mark for EVERY trading day from entry until the path cap, and
  # derive the realized exit (first profit_target/stop_loss/expiry), MFE and MAE
  # from that full path. ALL P&L comes from this day-by-day path — there are no
  # per-checkpoint d{N}_* columns. The whole series is stored as a comma-separated
  # string in the `daily_price_csv` column (split it on read for charting).
  #   path_cap_days — stop the path at min(DTE, this) calendar days. 120 ≈ the
  #                   window where edge actually lives, and bounds LEAP paths.
  #                   Also sets how far ahead flow is loaded for reappearance exits.
  path_cap_days: 120

  # Per-contract timeout (ms) for the Barchart price-history scrape. This is the
  # dominant cost of a run: each contract whose feed never fires (e.g. synthesised
  # short strikes that don't trade) waits this long before falling back. Lower it
  # to speed up runs that register many non-existent strikes. Only used when
  # 'barchart' is in exit_sources.
  history_timeout_ms: 15000

  # Exit pricing — tried in this order, first available wins (per trading day):
  #   barchart     — REAL per-contract daily price scraped from Barchart's
  #                  price-history page (marked to mid of Bid/Ask). Needs
  #                  BARCHART_EMAIL/PASSWORD; results cached under
  #                  backtests/option_history_cache/ so re-runs don't re-scrape.
  #   reappearance — REAL Trade price when the same contract recurs in a later
  #                  flow scrape on/after the checkpoint (free, but sparse).
  #   bs           — Black-Scholes model (last resort, when no real data exists).
  # To avoid all scraping, use: [reappearance, bs]  or just  [bs].
  exit_sources: [barchart, reappearance, bs]

  # For spread structures: how far OTM to synthesise the short leg ONLY when the
  # play doesn't name an explicit short strike. The short leg is a real contract,
  # so its Barchart history is fetched and netted out just like the long leg;
  # Black-Scholes is the fallback only when that contract has no history (e.g. a
  # synthesised strike that doesn't trade).
  spread_width_pct: 0.02

  # Risk-free rate for the Black-Scholes legs / fallback.
  risk_free_rate: 0.05

# ── Output ─────────────────────────────────────────────────────────────────────
output:
  # Local CSV (always written unless --dry-run).
  local_csv: backtests/results.csv

  # Google Sheets tab (set to null to skip).
  sheet_tab: BacktestResults
