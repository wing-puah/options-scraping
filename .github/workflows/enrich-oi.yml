name: Enrich OI

# Adds next-day OI change + EOD greeks to each compiled flow file. Enriching trade
# date D needs D+1's data, so this runs AFTER Compile Flow (which produces today's
# compiled file) and enriches the latest enrichable date only (no --backfill: a full
# historical sweep risks the job timeout). Resume is per-contract via the
# oi_enriched_on marker written into the compiled file itself, so a run that was cut
# short self-heals next time (the enriched CSV is checkpointed back to Drive as it
# goes — there is no separate history cache to restore between runs). Also chains
# the IV-percentile and price/earnings-catalyst enrichments, which enrich the same
# compiled file in place. The matched-pair counterpart-IV backfill writes a
# separate sidecar file instead, so it lives in its own workflow
# (fetch-counterpart-iv.yml).
#
# Needs the full requirements (Playwright) + Barchart creds to scrape per-contract
# price history; writes the enriched CSVs back to Drive (no Sheets access needed).

on:
  # Chain off Compile Flow so the day's compiled file exists before we enrich D-1.
  workflow_run:
    workflows: ["Compile Flow"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: 'Single trading date to enrich (YYYY-MM-DD). Blank = latest enrichable date.'
        required: false
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # On the workflow_run trigger, only proceed if Compile Flow succeeded. Manual
    # runs (workflow_dispatch) always proceed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        # Full set — the scraper needs Playwright/etc., not just the slim compile deps.
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        # Unconditional (not gated on cache-hit): the cache key only tracks
        # requirements.txt, but playwright>=1.44 is unpinned, so a newer resolved
        # pip version can need a browser revision the cache doesn't have (same
        # issue hit in scrape.yml — see its history). `playwright install` is a
        # no-op when the required revision is already cached, so this stays cheap.
        run: playwright install --with-deps chromium

      - name: Enrich compiled flow with next-day OI + EOD greeks
        # Manual run with a date → that date; otherwise the latest enrichable date
        # only (no --backfill: a full historical sweep risks the job timeout).
        # Headless scrape via BarchartSession.
        run: python scripts/collector/enrich_oi.py ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
        env:
          BARCHART_EMAIL: ${{ secrets.BARCHART_EMAIL }}
          BARCHART_PASSWORD: ${{ secrets.BARCHART_PASSWORD }}
          GOOGLE_OAUTH_TOKEN_JSON_CONTENT: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_CONTENT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SCRAPE_HEADLESS: 'true'

      - name: Enrich compiled flow with per-ticker IV percentile (latest date only)
        # Append each ticker's Barchart options-overview IV / IV rank / IV percentile
        # (as of trade date D) as columns on the compiled flow file — the per-name
        # rich/cheap read framework Step 4 uses to pick debit (TF) vs credit (TF-S).
        # Latest date ONLY (no --backfill): IV is as-of D (available same evening, no
        # D+1 wait), and a full sweep would re-scrape every historical date and risk
        # the timeout. Resume is per-ticker via the iv_pct_enriched_on marker written
        # into the compiled file. Manual date input respected.
        if: ${{ always() }}
        run: python scripts/collector/fetch_iv_percentile.py ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
        env:
          BARCHART_EMAIL: ${{ secrets.BARCHART_EMAIL }}
          BARCHART_PASSWORD: ${{ secrets.BARCHART_PASSWORD }}
          GOOGLE_OAUTH_TOKEN_JSON_CONTENT: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_CONTENT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SCRAPE_HEADLESS: 'true'

      - name: Enrich compiled flow with price/earnings catalyst (latest date only)
        # Append each ticker's price history + earnings-catalyst columns (as of trade
        # date D) that ground the pipeline-computed score_price/score_catalyst Step-5
        # rubric components. Latest date ONLY (no --backfill): as-of D, available same
        # evening, and a full sweep would re-scrape every historical date and risk the
        # timeout. Resume is per-ticker via the price_catalyst_enriched_on marker
        # written into the compiled file. Manual date input respected.
        if: ${{ always() }}
        run: python scripts/collector/fetch_price_catalyst.py ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
        env:
          BARCHART_EMAIL: ${{ secrets.BARCHART_EMAIL }}
          BARCHART_PASSWORD: ${{ secrets.BARCHART_PASSWORD }}
          GOOGLE_OAUTH_TOKEN_JSON_CONTENT: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_CONTENT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SCRAPE_HEADLESS: 'true'
