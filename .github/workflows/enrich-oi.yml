name: Enrich OI

# Adds next-day OI change + EOD greeks to each compiled flow file. Enriching trade
# date D needs D+1's data, so this runs AFTER Compile Flow (which produces today's
# compiled file) and enriches the PRIOR day(s) via --backfill. Resume is per-contract
# via the oi_enriched_on marker written into the compiled file itself: a backfill
# scrapes only contracts not yet attempted, so it self-heals any run that was cut
# short (the enriched CSV is checkpointed back to Drive as it goes — there is no
# separate history cache to restore between runs).
#
# Needs the full requirements (Playwright) + Barchart creds to scrape per-contract
# price history; writes the enriched CSVs back to Drive (no Sheets access needed).

on:
  # Chain off Compile Flow so the day's compiled file exists before we enrich D-1.
  workflow_run:
    workflows: ["Compile Flow"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: 'Single trading date to enrich (YYYY-MM-DD). Blank = --backfill.'
        required: false
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # On the workflow_run trigger, only proceed if Compile Flow succeeded. Manual
    # runs (workflow_dispatch) always proceed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        # Full set — the scraper needs Playwright/etc., not just the slim compile deps.
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Enrich compiled flow with next-day OI + EOD greeks
        # Manual run with a date → that date; otherwise --backfill (every enrichable
        # date not yet enriched). Headless scrape via BarchartSession.
        run: python scripts/enrich_oi.py ${{ inputs.date && format('--date {0}', inputs.date) || '--backfill' }}
        env:
          BARCHART_EMAIL: ${{ secrets.BARCHART_EMAIL }}
          BARCHART_PASSWORD: ${{ secrets.BARCHART_PASSWORD }}
          GOOGLE_OAUTH_TOKEN_JSON_CONTENT: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_CONTENT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SCRAPE_HEADLESS: 'true'

      - name: Backfill matched-pair counterpart IV (latest date only)
        # Fetch the missing call/put leg's settlement IV for single-sided in-window
        # pairs, so the analysis rollup's IVspr/IVskew are populated (~96% vs ~2% on
        # flow alone). Latest date ONLY — no --backfill: unlike enrich, IV is as-of
        # trade date D (available same evening, no D+1 wait), and a full sweep would
        # re-scan every historical date and risk the job timeout. Idempotent per
        # contract via the sidecar's fetched_on marker. Manual date input respected.
        if: ${{ always() }}
        run: python scripts/fetch_counterpart_iv.py ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
        env:
          BARCHART_EMAIL: ${{ secrets.BARCHART_EMAIL }}
          BARCHART_PASSWORD: ${{ secrets.BARCHART_PASSWORD }}
          GOOGLE_OAUTH_TOKEN_JSON_CONTENT: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_CONTENT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SCRAPE_HEADLESS: 'true'

      - name: Enrich compiled flow with per-ticker IV percentile (latest date only)
        # Append each ticker's Barchart options-overview IV / IV rank / IV percentile
        # (as of trade date D) as columns on the compiled flow file — the per-name
        # rich/cheap read framework Step 4 uses to pick debit (TF) vs credit (TF-S).
        # Latest date ONLY (no --backfill): IV is as-of D (available same evening, no
        # D+1 wait), and a full sweep would re-scrape every historical date and risk
        # the timeout. Resume is per-ticker via the iv_pct_enriched_on marker written
        # into the compiled file. Manual date input respected.
        if: ${{ always() }}
        run: python scripts/fetch_iv_percentile.py ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
        env:
          BARCHART_EMAIL: ${{ secrets.BARCHART_EMAIL }}
          BARCHART_PASSWORD: ${{ secrets.BARCHART_PASSWORD }}
          GOOGLE_OAUTH_TOKEN_JSON_CONTENT: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_CONTENT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SCRAPE_HEADLESS: 'true'
