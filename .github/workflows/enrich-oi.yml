name: Enrich OI

# Adds next-day OI change + EOD greeks to each compiled flow file. Enriching trade
# date D needs D+1's data, so this runs AFTER Compile Flow (which produces today's
# compiled file) and enriches the PRIOR day(s) via --backfill. Idempotent: dates
# already carrying the columns are skipped, so a backfill only scrapes the newly
# enrichable day in steady state and self-heals any it couldn't finish in time.
#
# Needs the full requirements (Playwright) + Barchart creds to scrape per-contract
# price history; writes the enriched CSVs back to Drive (no Sheets access needed).

on:
  # Chain off Compile Flow so the day's compiled file exists before we enrich D-1.
  workflow_run:
    workflows: ["Compile Flow"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: 'Single trading date to enrich (YYYY-MM-DD). Blank = --backfill.'
        required: false
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # On the workflow_run trigger, only proceed if Compile Flow succeeded. Manual
    # runs (workflow_dispatch) always proceed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        # Full set — the scraper needs Playwright/etc., not just the slim compile deps.
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Restore per-contract price-history cache
        # Reuse scraped histories across runs so a backfill doesn't re-scrape the
        # same contracts. The rotating key always saves a fresh, accumulated cache.
        uses: actions/cache@v5
        with:
          path: backtests/option_history_cache
          key: oi-history-${{ github.run_id }}
          restore-keys: |
            oi-history-

      - name: Enrich compiled flow with next-day OI + EOD greeks
        # Manual run with a date → that date; otherwise --backfill (every enrichable
        # date not yet enriched). Headless scrape via BarchartSession.
        run: python scripts/enrich_oi.py ${{ inputs.date && format('--date {0}', inputs.date) || '--backfill' }}
        env:
          BARCHART_EMAIL: ${{ secrets.BARCHART_EMAIL }}
          BARCHART_PASSWORD: ${{ secrets.BARCHART_PASSWORD }}
          GOOGLE_OAUTH_TOKEN_JSON_CONTENT: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_CONTENT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SCRAPE_HEADLESS: 'true'
