name: Options Scraper

on:
  schedule:
    # flow — every hour at :30 from 13:30–21:30 UTC, Mon-Fri.
    # EDT (UTC-4): covers 9:30 AM – 5:30 PM ET; EST (UTC-5): covers 8:30 AM – 4:30 PM ET.
    - cron: '30 13-21 * * 1-5'
    # unusual — once at 22:00 UTC, Mon-Fri: market close (16:00 ET) + 1h buffer so data has settled.
    # 22:00 UTC = 18:00 ET in EDT (close +2h) / 17:00 ET in EST (close +1h) — always ≥1h after close.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: false
        default: 'flow'
        type: choice
        options:
          - flow
          - unusual

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run scraper
        # Manual run: use the chosen input. Scheduled run: the 22:00 UTC cron means
        # unusual; every other (hourly) cron means flow.
        run: python scripts/collector/scrape_flow.py --mode ${{ inputs.mode || (github.event.schedule == '0 22 * * 1-5' && 'unusual' || 'flow') }}
        env:
          BARCHART_EMAIL: ${{ secrets.BARCHART_EMAIL }}
          BARCHART_PASSWORD: ${{ secrets.BARCHART_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
          GOOGLE_OAUTH_TOKEN_JSON_CONTENT: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_CONTENT }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SCRAPE_HEADLESS: 'true'
